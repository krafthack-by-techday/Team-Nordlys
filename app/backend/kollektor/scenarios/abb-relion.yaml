pack: abb-relion
vendor: ABB
equipment_type: protection-relay
maintainer: kraftcert
version: "2026.04.1"
description: |
  Deteksjonsregler for ABB Relion-serien (REF/REM/RET 615/620/630) av vernrelé.
  Bygd på offentlig dokumentasjon av Relion web-HMI og SSH-grensesnittenes
  syslog-format. Matcher etter polske 2024–2025 angreps-TTPer (Z-Pentest /
  Sector 16): internett-eksponert grensesnitt → default-creds → setpunkt-tukling.

scenarios:
  - id: relion-bruteforce-burst
    title: "Brute-force mot ABB Relion vernrelé"
    description: "5+ mislykkede innloggingsforsøk mot Relion web/SSH innen 60 sekunder"
    maturity: stable
    fp_likelihood: low
    mitre: [T1110.001, T0883]
    match:
      regex: 'RELION\d+\s+(?:web|sshd):\s+(?:authentication failure|Failed password)\b.*?(?:user=|for\s+)(?P<user>\S+).*?(?:source=|from\s+)(?P<src>\S+)'
    aggregate:
      window_seconds: 60
      threshold: 5
      key: [src]
    severity: high
    external_ref_template: "relion-bf-{src}-{window_start}"

  - id: relion-default-cred-success
    title: "Vellykket innlogging på Relion fra ekstern IP"
    description: "Web/SSH-innlogging fra ikke-RFC1918 kilde — mistanke om default-credential utnyttelse"
    maturity: stable
    fp_likelihood: medium
    mitre: [T0812, T0883]
    match:
      regex: 'RELION\d+\s+(?:sshd|web):\s+(?:Accepted password|authentication SUCCESS)\b.*?(?:for\s+|user=)(?P<user>\S+).*?(?:from\s+|source=)(?P<src>\S+)'
    severity: critical
    external_ref_template: "relion-login-{src}-{user}"

  - id: relion-setpoint-change
    title: "Setpunkt-endring på Relion-vernrelé"
    description: "Beskyttelses-setpunkt manuelt endret. Krever verifikasjon av at vedlikehold er autorisert."
    maturity: stable
    fp_likelihood: medium
    mitre: [T0831, T0836]
    match:
      regex: 'RELION\d+\s+control:\s+setpoint\s+(?P<param>\S+)\s+changed\s+(?P<old>\S+)\s*(?:->|→)\s*(?P<new>\S+)\s+by\s+(?:user=)?(?P<user>\S+).*?(?:from=|source=)(?P<src>\S+)'
    severity: critical
    external_ref_template: "relion-setpoint-{param}-{src}"

  - id: relion-firmware-tampering
    title: "Firmware-tukling på Relion-vernrelé"
    description: "Firmware-opplasting eller -aktivering på vernrelé. Krever umiddelbar verifikasjon mot fysisk vedlikehold."
    maturity: stable
    fp_likelihood: low
    mitre: [T0857, T0839]
    match:
      regex: 'RELION\d+\s+firmware:\s+(?:upload started|activated|installed|loaded)\s+by\s+(?:user=)?(?P<user>\S+).*?(?:from=|source=)(?P<src>\S+)'
    severity: critical
    external_ref_template: "relion-fw-{src}-{user}"
