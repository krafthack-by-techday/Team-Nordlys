services:
  # ── Varder (relays) ──────────────────────────────────────────────
  # Bærer trafikk til noder som ikke eksponerer porter.
  # Ser kun proxyet trafikk — ingen egen tilstand.

  varde-kraftcert:
    build: ./varde
    ports:
      - "8000:8000"
    environment:
      UPSTREAM_URL: http://kraftcert:8000
    depends_on:
      - kraftcert

  varde-statnett:
    build: ./varde
    ports:
      - "8004:8000"
    environment:
      UPSTREAM_URL: http://statnett:8000
    depends_on:
      - statnett

  # ── Noder ────────────────────────────────────────────────────────

  kraftcert:
    build: ./backend
    # Ingen eksponerte porter — varde-kraftcert håndterer ekstern tilgang
    environment:
      NODE_ID: kraftcert-01
      COMPANY: KraftCERT
      ROLE: kraftcert
      PEERS: ""
      PUBLIC_URL: http://localhost:8000
      VARDE_NAME: varde-kraftcert
    volumes:
      - kraftcert-data:/data

  hafslund:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      NODE_ID: hafslund-01
      COMPANY: Hafslund Kraft
      ROLE: peer
      PEERS: http://kraftcert:8000
      KRAFTCERT_URL: http://kraftcert:8000
      INVITE_TOKEN: ${INVITE_HAFSLUND:-}
      PUBLIC_URL: http://localhost:8001
    volumes:
      - hafslund-data:/data
    depends_on:
      - kraftcert

  glitrenett:
    build: ./backend
    ports:
      - "8002:8000"
    environment:
      NODE_ID: glitrenett-01
      COMPANY: Glitrenett
      ROLE: peer
      PEERS: http://kraftcert:8000
      KRAFTCERT_URL: http://kraftcert:8000
      INVITE_TOKEN: ${INVITE_GLITRENETT:-}
      PUBLIC_URL: http://localhost:8002
    volumes:
      - glitrenett-data:/data
    depends_on:
      - kraftcert

  aenergi:
    build: ./backend
    ports:
      - "8003:8000"
    environment:
      NODE_ID: aenergi-01
      COMPANY: Aenergi
      ROLE: peer
      PEERS: http://kraftcert:8000
      KRAFTCERT_URL: http://kraftcert:8000
      INVITE_TOKEN: ${INVITE_AENERGI:-}
      PUBLIC_URL: http://localhost:8003
    volumes:
      - aenergi-data:/data
    depends_on:
      - kraftcert

  statnett:
    build: ./backend
    # Ingen eksponerte porter — varde-statnett håndterer ekstern tilgang
    environment:
      NODE_ID: statnett-01
      COMPANY: Statnett
      ROLE: peer
      PEERS: http://kraftcert:8000
      KRAFTCERT_URL: http://kraftcert:8000
      INVITE_TOKEN: ${INVITE_STATNETT:-}
      PUBLIC_URL: http://localhost:8004
      VARDE_NAME: varde-statnett
    volumes:
      - statnett-data:/data
    depends_on:
      - kraftcert

volumes:
  kraftcert-data:
  hafslund-data:
  glitrenett-data:
  aenergi-data:
  statnett-data:
