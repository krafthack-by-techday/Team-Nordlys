<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STK — Mesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #060912;
  --fg:        #e8e3d4;
  --fg-dim:    #9a9789;
  --aurora-1:  #7fdcb5;
  --aurora-2:  #8fc3df;
  --aurora-3:  #d8c98a;
  --offline:   #475569;
  --revoked:   #c75454;
  --high:      #d99964;
  --medium:    #d8c98a;
  --low:       #7fdcb5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'JetBrains Mono', 'Menlo', monospace;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  -webkit-font-smoothing: antialiased;
}

canvas {
  display: block;
  background: var(--bg);
  cursor: default;
}
canvas.over-node { cursor: grab; }
canvas.grabbing  { cursor: grabbing; }
</style>
</head>
<body>

<canvas id="topo"></canvas>

<script>
// ── Tokens (mirrored to JS) ───────────────────────────────

const C = {
  bg:      '#060912',
  fg:      '#e8e3d4',
  fgDim:   '#9a9789',
  aurora1: '#7fdcb5',
  aurora2: '#8fc3df',
  aurora3: '#d8c98a',
  offline: '#475569',
  revoked: '#c75454',
  high:    '#d99964',
  medium:  '#d8c98a',
  low:     '#7fdcb5',
};

const canvas = document.getElementById('topo');
const ctx = canvas.getContext('2d');

// ── State ─────────────────────────────────────────────────

const nodes = new Map();
const links = [];
let particles = [];
let pulses = [];
let linkActivity = new Map();
let dashOffset = 0;

// Camera
const camera = { zoom: 1.6, x: 0, y: 0 };
let dragNode = null;
let dragStart = null;
let panning = null;

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function screenToWorld(sx, sy) {
  return { x: (sx - camera.x) / camera.zoom, y: (sy - camera.y) / camera.zoom };
}
function centerCamera() {
  const W = window.innerWidth, H = window.innerHeight;
  camera.x = W / 2 - (W / 2) * camera.zoom;
  camera.y = H / 2 - (H / 2) * camera.zoom;
}
centerCamera();
window.addEventListener('resize', centerCamera);

function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16),
  ];
}

// ── Topology (no backend; pure animation) ─────────────────

const TOPOLOGY = [
  { id: 'kraftcert-01', company: 'KraftCERT',     role: 'kraftcert', varde: '' },
  { id: 'hafslund-01',  company: 'Hafslund Kraft', role: 'peer',      varde: '' },
  { id: 'glitre-01',    company: 'Glitrenett',     role: 'peer',      varde: '' },
  { id: 'elhub-01',     company: 'Elhub',          role: 'peer',      varde: '' },
  { id: 'statkraft-01', company: 'Statkraft',      role: 'peer',      varde: 'varde-oslo' },
  { id: 'skagerak-01',     company: 'Skagerak Energi', role: 'peer',     varde: 'varde-kristiansand' },
];
const LINKS = [
  ['kraftcert-01', 'hafslund-01'],
  ['kraftcert-01', 'glitre-01'],
  ['kraftcert-01', 'elhub-01'],
  ['kraftcert-01', 'statkraft-01'],
  ['kraftcert-01', 'skagerak-01'],
  ['hafslund-01',  'glitre-01'],
  ['glitre-01',    'elhub-01'],
  ['elhub-01',     'statkraft-01'],
  ['statkraft-01', 'skagerak-01'],
  ['skagerak-01',     'hafslund-01'],
];

function init() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const R = 220;
  const peers = TOPOLOGY.filter(t => t.role !== 'kraftcert');
  for (const t of TOPOLOGY) {
    let x, y;
    if (t.role === 'kraftcert') { x = cx; y = cy; }
    else {
      const i = peers.indexOf(t);
      const ang = (i / peers.length) * Math.PI * 2 - Math.PI / 2;
      x = cx + Math.cos(ang) * R;
      y = cy + Math.sin(ang) * R;
    }
    nodes.set(t.id, {
      x, y, vx: 0, vy: 0,
      company: t.company, role: t.role, online: true, revoked: false,
      varde: t.varde,
    });
  }
  for (const [a, b] of LINKS) links.push({ source: a, target: b });
}

function emitActivity(srcId, tgtId, action, count) {
  const src = nodes.get(srcId), tgt = nodes.get(tgtId);
  if (!src || !tgt || src.revoked || tgt.revoked) return;
  const lk = [srcId, tgtId].sort().join('::');
  linkActivity.set(lk, { lastActive: Date.now(), intensity: 1 });
  if (action === 'push') {
    particles.push({ srcId, tgtId, progress: 0, speed: 0.025,
      color: C.aurora1, size: 4 + Math.min(count, 5) });
  } else if (action === 'pull') {
    particles.push({ srcId: tgtId, tgtId: srcId, progress: 0, speed: 0.015,
      color: C.aurora2, size: 3 + Math.min(count, 4) });
  } else if (action === 'discovery') {
    particles.push({ srcId: tgtId, tgtId: srcId, progress: 0, speed: 0.02,
      color: C.aurora3, size: 3 });
  } else if (action === 'pull_identity') {
    particles.push({ srcId: tgtId, tgtId: srcId, progress: 0, speed: 0.018,
      color: C.aurora1, size: 3 });
  }
}

function emitEventPulse(nodeId, severity) {
  const n = nodes.get(nodeId);
  if (!n || n.revoked) return;
  const color =
    severity === 'critical' ? C.revoked :
    severity === 'high' ? C.high :
    severity === 'medium' ? C.medium : C.aurora1;
  pulses.push({ x: n.x, y: n.y, radius: 0, opacity: 1, color });
}

function pickWeighted(weights) {
  const sum = weights.reduce((s, w) => s + w[1], 0);
  let r = Math.random() * sum;
  for (const [v, w] of weights) { r -= w; if (r <= 0) return v; }
  return weights[weights.length - 1][0];
}

function tickGossip() {
  const live = links.filter(l => {
    const a = nodes.get(l.source), b = nodes.get(l.target);
    return a && b && !a.revoked && !b.revoked;
  });
  if (!live.length) return;
  const link = live[Math.floor(Math.random() * live.length)];
  const action = pickWeighted([
    ['push', 38], ['pull', 32], ['pull_identity', 14],
    ['discovery', 8], ['skip', 8],
  ]);
  if (action === 'skip') return;

  let srcId = link.source, tgtId = link.target;
  if (Math.random() < 0.5) [srcId, tgtId] = [tgtId, srcId];
  if (action === 'pull_identity') {
    const kc = [link.source, link.target].find(id => nodes.get(id)?.role === 'kraftcert');
    if (kc) { srcId = kc; tgtId = (link.source === kc ? link.target : link.source); }
  }
  const count = action === 'push' || action === 'pull'
    ? 1 + Math.floor(Math.random() * 4) : 1;
  emitActivity(srcId, tgtId, action, count);
}

const SEVERITIES = ['low', 'medium', 'high', 'critical'];
function tickEvent() {
  const peers = [...nodes.entries()].filter(([, n]) => !n.revoked && n.role !== 'kraftcert');
  if (!peers.length) return;
  const [nodeId] = peers[Math.floor(Math.random() * peers.length)];
  const sev = pickWeighted([['low', 25], ['medium', 35], ['high', 25], ['critical', 15]]);
  emitEventPulse(nodeId, sev);
  const myLinks = links.filter(l => l.source === nodeId || l.target === nodeId);
  const fanout = Math.min(myLinks.length, 1 + Math.floor(Math.random() * 2));
  const shuffled = myLinks.slice().sort(() => Math.random() - 0.5).slice(0, fanout);
  shuffled.forEach((lk, i) => {
    const tgt = lk.source === nodeId ? lk.target : lk.source;
    setTimeout(() => emitActivity(nodeId, tgt, 'push', 1), 400 + i * 600);
  });
}

// ── Physics ───────────────────────────────────────────────

function simulate() {
  const arr = [...nodes.values()];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < arr.length; i++) {
    for (let j = i + 1; j < arr.length; j++) {
      const a = arr[i], b = arr[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 1;
      let force = 8000 / (dist * dist);
      let fx = (dx / dist) * force, fy = (dy / dist) * force;
      a.vx -= fx; a.vy -= fy; b.vx += fx; b.vy += fy;
    }
  }
  for (const link of links) {
    const a = nodes.get(link.source), b = nodes.get(link.target);
    if (!a || !b) continue;
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx*dx + dy*dy) || 1;
    let force = (dist - 180) * 0.005;
    let fx = (dx / dist) * force, fy = (dy / dist) * force;
    a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
  }
  for (const n of arr) {
    n.vx += (cx - n.x) * 0.0003;
    n.vy += (cy - n.y) * 0.0003;
  }
  for (const n of arr) {
    if (n === dragNode) continue;
    n.vx *= 0.85; n.vy *= 0.85;
    n.x += n.vx; n.y += n.vy;
  }
}

// ── Rendering ─────────────────────────────────────────────

function draw() {
  const W = window.innerWidth, H = window.innerHeight;
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(camera.x, camera.y);
  ctx.scale(camera.zoom, camera.zoom);

  dashOffset -= 0.15;
  const now = Date.now();

  // Links
  for (const link of links) {
    const a = nodes.get(link.source), b = nodes.get(link.target);
    if (!a || !b) continue;
    const bothOnline = a.online && b.online && !a.revoked && !b.revoked;
    const lk = [link.source, link.target].sort().join('::');
    const act = linkActivity.get(lk);
    const isActive = act && (now - act.lastActive < 5000);
    if (act) act.intensity = Math.max(0, 1 - (now - act.lastActive) / 5000);

    if (isActive && bothOnline) {
      ctx.strokeStyle = `rgba(127,220,181,${0.18 * act.intensity})`;
      ctx.lineWidth = 8;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      ctx.strokeStyle = `rgba(127,220,181,${0.25 + 0.35 * act.intensity})`;
      ctx.lineWidth = 1.5;
    } else {
      ctx.strokeStyle = bothOnline ? 'rgba(127,220,181,0.16)' : 'rgba(232,227,212,0.10)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.lineDashOffset = dashOffset;
    }
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    ctx.setLineDash([]); ctx.lineDashOffset = 0;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.progress += p.speed;
    if (p.progress >= 1) { particles.splice(i, 1); continue; }
    const src = nodes.get(p.srcId), tgt = nodes.get(p.tgtId);
    if (!src || !tgt) { particles.splice(i, 1); continue; }
    const x = src.x + (tgt.x - src.x) * p.progress;
    const y = src.y + (tgt.y - src.y) * p.progress;
    const [r, g, b] = hexToRgb(p.color);

    const grad = ctx.createRadialGradient(x, y, 0, x, y, p.size * 3);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.35)`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, p.size * 3, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(x, y, p.size, 0, Math.PI * 2); ctx.fill();

    const trailLen = 0.08;
    const tx = src.x + (tgt.x - src.x) * Math.max(0, p.progress - trailLen);
    const ty = src.y + (tgt.y - src.y) * Math.max(0, p.progress - trailLen);
    const trailGrad = ctx.createLinearGradient(tx, ty, x, y);
    trailGrad.addColorStop(0, 'transparent');
    trailGrad.addColorStop(1, `rgba(${r},${g},${b},0.45)`);
    ctx.strokeStyle = trailGrad;
    ctx.lineWidth = p.size * 0.8;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(x, y); ctx.stroke();
  }

  // Pulses
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.radius += 2; p.opacity -= 0.015;
    if (p.opacity <= 0) { pulses.splice(i, 1); continue; }
    const [r, g, b] = hexToRgb(p.color);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${p.opacity})`;
    ctx.lineWidth = 2; ctx.stroke();
  }

  // Nodes
  for (const [, n] of nodes) {
    const isKC = n.role === 'kraftcert';
    const radius = isKC ? 36 : 28;

    if (n.online && !n.revoked) {
      const color = isKC ? 'rgba(143,195,223,0.16)' : 'rgba(127,220,181,0.13)';
      const grad = ctx.createRadialGradient(n.x, n.y, radius, n.x, n.y, radius * 2.6);
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(n.x, n.y, radius * 2.6, 0, Math.PI * 2); ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
    if (n.revoked) {
      ctx.fillStyle = 'rgba(199,84,84,0.10)';
      ctx.strokeStyle = 'rgba(199,84,84,0.7)';
    } else if (isKC) {
      ctx.fillStyle = 'rgba(143,195,223,0.10)';
      ctx.strokeStyle = 'rgba(143,195,223,0.7)';
    } else {
      ctx.fillStyle = 'rgba(127,220,181,0.08)';
      ctx.strokeStyle = 'rgba(127,220,181,0.6)';
    }
    ctx.lineWidth = isKC ? 2 : 1.6;
    ctx.fill(); ctx.stroke();

    if (isKC && !n.revoked) {
      ctx.beginPath(); ctx.arc(n.x, n.y, radius - 7, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(143,195,223,0.32)';
      ctx.lineWidth = 1; ctx.stroke();
    }

    if (n.revoked) {
      ctx.strokeStyle = 'rgba(199,84,84,0.75)';
      ctx.lineWidth = 2;
      const s = radius * 0.5;
      ctx.beginPath(); ctx.moveTo(n.x - s, n.y - s); ctx.lineTo(n.x + s, n.y + s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(n.x + s, n.y - s); ctx.lineTo(n.x - s, n.y + s); ctx.stroke();
    }

    if (n.varde) {
      ctx.beginPath(); ctx.arc(n.x, n.y, radius + 11, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(216,201,138,0.42)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.lineDashOffset = dashOffset * 2;
      ctx.stroke();
      ctx.setLineDash([]); ctx.lineDashOffset = 0;
    }

    ctx.font = `${isKC ? 600 : 500} ${isKC ? 14 : 13}px "Bricolage Grotesque", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = n.revoked ? 'rgba(199,84,84,0.85)' : C.fg;
    ctx.fillText(n.company, n.x, n.y + radius + 10);
  }

  ctx.restore();

  simulate();
  requestAnimationFrame(draw);
}

// ── Interaction (drag, pan, zoom) ─────────────────────────

function getNodeAt(sx, sy) {
  const w = screenToWorld(sx, sy);
  for (const [id, n] of nodes) {
    const dx = w.x - n.x, dy = w.y - n.y;
    const r = n.role === 'kraftcert' ? 36 : 28;
    if (dx * dx + dy * dy < (r + 12) * (r + 12)) return { id, node: n };
  }
  return null;
}

canvas.addEventListener('mousedown', (e) => {
  const hit = getNodeAt(e.clientX, e.clientY);
  if (hit) {
    dragNode = hit.node;
    dragStart = { x: e.clientX, y: e.clientY };
  } else {
    panning = { x: e.clientX, y: e.clientY, camX: camera.x, camY: camera.y };
  }
  canvas.classList.add('grabbing');
});

canvas.addEventListener('mousemove', (e) => {
  if (dragNode) {
    const w = screenToWorld(e.clientX, e.clientY);
    dragNode.x = w.x; dragNode.y = w.y;
    dragNode.vx = 0; dragNode.vy = 0;
  } else if (panning) {
    camera.x = panning.camX + (e.clientX - panning.x);
    camera.y = panning.camY + (e.clientY - panning.y);
  } else {
    canvas.classList.toggle('over-node', !!getNodeAt(e.clientX, e.clientY));
  }
});

canvas.addEventListener('mouseup', () => {
  dragNode = null; dragStart = null; panning = null;
  canvas.classList.remove('grabbing');
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * 0.0015);
  const newZoom = Math.max(0.4, Math.min(4, camera.zoom * factor));
  const wx = (e.clientX - camera.x) / camera.zoom;
  const wy = (e.clientY - camera.y) / camera.zoom;
  camera.zoom = newZoom;
  camera.x = e.clientX - wx * camera.zoom;
  camera.y = e.clientY - wy * camera.zoom;
}, { passive: false });

canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  const hit = getNodeAt(t.clientX, t.clientY);
  if (hit) { dragNode = hit.node; e.preventDefault(); }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (dragNode) {
    const t = e.touches[0];
    const w = screenToWorld(t.clientX, t.clientY);
    dragNode.x = w.x; dragNode.y = w.y;
    dragNode.vx = 0; dragNode.vy = 0;
    e.preventDefault();
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { dragNode = null; });

// ── Boot ──────────────────────────────────────────────────

init();
setInterval(tickGossip, 1600);
setInterval(tickEvent, 12000);
setTimeout(tickEvent, 2500);
draw();
</script>
</body>
</html>
