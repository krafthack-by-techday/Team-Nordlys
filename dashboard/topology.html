<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STK — Nettverkstopologi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Style-kit tokens (mirrored from stage/style-kit.html) ── */
  --bg:        #060912;
  --bg-2:      #0e1524;
  --fg:        #e8e3d4;
  --fg-dim:    #9a9789;
  --aurora-1:  #7fdcb5;
  --aurora-2:  #8fc3df;
  --aurora-3:  #d8c98a;
  --aurora-1-soft: #5fe4b7;
  --aurora-2-soft: #6fb7e0;
  --aurora-3-soft: #d6e3a8;
  --line:      rgba(232,227,212,0.14);
  --line-hi:   rgba(232,227,212,0.30);

  /* ── Operational accents (kept distinct from aurora palette) ── */
  --offline:   #475569;
  --revoked:   #c75454;
  --critical:  #c75454;
  --high:      #d99964;
  --medium:    #d8c98a;
  --low:       #7fdcb5;

  --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-mono);
  font-feature-settings: 'ss01', 'ss02';
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ── Atmosphere (matches stage/style-kit.html) ───────────── */

.aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.aurora__blob { position: absolute; border-radius: 50%; filter: blur(140px); mix-blend-mode: screen; will-change: transform; }
.aurora__blob--a {
  top: -25vh; left: -15vw; width: 95vw; height: 95vh;
  background: radial-gradient(circle at 30% 30%, var(--aurora-1-soft) 0%, transparent 60%);
  opacity: 0.32;
  animation: drift-a 26s ease-in-out infinite alternate;
}
.aurora__blob--b {
  bottom: -30vh; right: -20vw; width: 100vw; height: 100vh;
  background: radial-gradient(circle at 70% 70%, var(--aurora-2-soft) 0%, transparent 55%);
  opacity: 0.26;
  animation: drift-b 32s ease-in-out infinite alternate;
}
.aurora__blob--c {
  top: 25%; left: 35%; width: 65vw; height: 65vh;
  background: radial-gradient(circle, var(--aurora-3-soft) 0%, transparent 60%);
  opacity: 0.16;
  animation: drift-c 40s ease-in-out infinite alternate;
}
@keyframes drift-a { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(22vw,12vh) scale(1.18);} }
@keyframes drift-b { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(-18vw,-22vh) scale(1.12);} }
@keyframes drift-c { 0%{transform:translate(0,0) scale(1) rotate(0deg);} 100%{transform:translate(-12vw,14vh) scale(0.85) rotate(50deg);} }

.grain {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  opacity: 0.05; mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

.vignette {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
}

/* ── Canvas ──────────────────────────────────────────────── */

canvas { display: block; cursor: grab; position: relative; z-index: 3; background: transparent; }
canvas:active { cursor: grabbing; }

/* ── HUD ─────────────────────────────────────────────────── */

.hud {
  position: fixed;
  top: 1.6rem; left: 2rem;
  z-index: 10;
  pointer-events: none;
}

.hud-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.28em;
  color: var(--fg-dim);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 0.8rem;
  margin-bottom: 0.6rem;
}
.hud-eyebrow::before { content:''; width: 1.8rem; height: 1px; background: var(--aurora-1); }

.hud-title {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 96, 'wght' 700;
  font-size: 2.2rem;
  letter-spacing: -0.035em;
  line-height: 0.9;
  background: linear-gradient(110deg, var(--aurora-3) 0%, var(--aurora-1) 50%, var(--aurora-2) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  background-size: 220% 100%;
  animation: shimmer 9s ease-in-out infinite alternate;
}
@keyframes shimmer { 0%{background-position:0% 50%;} 100%{background-position:100% 50%;} }

.hud-sub {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--fg-dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 0.45rem;
}

/* ── Stats ───────────────────────────────────────────────── */

.stats {
  position: fixed;
  top: 1.6rem; right: 2rem;
  z-index: 10;
  text-align: right;
  pointer-events: none;
}

.stats-line {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--fg-dim);
  line-height: 1.7;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.stats-val {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 96, 'wght' 600;
  color: var(--aurora-1);
  font-size: 1.05rem;
  letter-spacing: -0.01em;
  margin-left: 0.4rem;
}

/* ── Legend ──────────────────────────────────────────────── */

.legend {
  position: fixed;
  bottom: 1.6rem; left: 2rem;
  z-index: 10;
  display: flex; flex-wrap: wrap; gap: 0.35rem 1.2rem;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  max-width: 60vw;
}

.legend-item { display: flex; align-items: center; gap: 0.5rem; }

.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-dot.online    { background: var(--aurora-1); box-shadow: 0 0 8px var(--aurora-1); }
.legend-dot.offline   { background: var(--offline); }
.legend-dot.revoked   { background: var(--revoked); }
.legend-dot.kraftcert { background: var(--aurora-2); box-shadow: 0 0 8px var(--aurora-2); }
.legend-dot.varde     { background: var(--aurora-3); box-shadow: 0 0 8px var(--aurora-3); }

/* ── Zoom hint ───────────────────────────────────────────── */

.zoom-hint {
  position: fixed;
  bottom: 1.6rem; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--fg-dim);
  background: rgba(6,9,18,0.55);
  border: 1px solid var(--line);
  padding: 0.45rem 0.9rem;
  border-radius: 999px;
  backdrop-filter: blur(8px);
  pointer-events: none;
  display: flex; gap: 0.9rem;
  opacity: 0.85;
}
.zoom-hint span { color: var(--aurora-1); margin-right: 0.35rem; }

/* ── Event log ───────────────────────────────────────────── */

.event-log {
  position: fixed;
  bottom: 1.6rem; right: 2rem;
  z-index: 10;
  width: 360px;
  max-height: 220px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.log-entry {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--fg-dim);
  padding: 0.4rem 0.7rem;
  background: rgba(6,9,18,0.65);
  border: 1px solid var(--line);
  border-left: 2px solid var(--aurora-1);
  backdrop-filter: blur(8px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.04em;
  animation: log-in 0.3s ease-out;
}
.log-entry.critical { border-left-color: var(--critical); }
.log-entry.high     { border-left-color: var(--high); }
.log-entry.medium   { border-left-color: var(--medium); }
.log-entry.low      { border-left-color: var(--low); }

@keyframes log-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Detail panel ────────────────────────────────────────── */

.panel {
  position: fixed;
  top: 0; right: -420px;
  width: 380px;
  height: 100vh;
  background: rgba(14,21,36,0.82);
  border-left: 1px solid var(--line-hi);
  backdrop-filter: blur(14px);
  z-index: 20;
  padding: 1.6rem 1.4rem;
  overflow-y: auto;
  transition: right 0.35s cubic-bezier(0.22,0.61,0.36,1);
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
}
.panel.open { right: 0; }

.panel-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.8rem;
}

.panel-company {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 96, 'wght' 600;
  font-size: 1.5rem;
  letter-spacing: -0.02em;
  line-height: 1.05;
  color: var(--fg);
}

.panel-close {
  background: none; border: none;
  color: var(--fg-dim);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  line-height: 1;
}
.panel-close:hover { background: var(--line); color: var(--fg); }

.panel-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 0.18rem 0.6rem;
  border-radius: 999px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 500;
  margin-right: 0.35rem;
  border: 1px solid transparent;
}
.panel-badge.online    { background: rgba(127,220,181,0.10); color: var(--aurora-1); border-color: rgba(127,220,181,0.30); }
.panel-badge.offline   { background: rgba(154,151,137,0.08); color: var(--fg-dim); border-color: var(--line); }
.panel-badge.revoked   { background: rgba(199,84,84,0.12); color: var(--revoked); border-color: rgba(199,84,84,0.4); }
.panel-badge.idp       { background: rgba(143,195,223,0.10); color: var(--aurora-2); border-color: rgba(143,195,223,0.32); }
.panel-badge.varde     { background: rgba(216,201,138,0.10); color: var(--aurora-3); border-color: rgba(216,201,138,0.32); }

.panel-section {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--aurora-1);
  text-transform: uppercase;
  letter-spacing: 0.22em;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--line);
  margin-top: 0.2rem;
}

.panel-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem 0.9rem;
}

.panel-meta-item {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}

.panel-meta-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 0.16em;
}

.panel-meta-val {
  font-family: var(--font-display);
  font-size: 0.95rem;
  color: var(--fg);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.005em;
}

.panel-actions {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.panel-btn {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.55rem 0.9rem;
  border: 1px solid var(--line-hi);
  border-radius: 4px;
  background: rgba(6,9,18,0.55);
  color: var(--aurora-1);
  cursor: pointer;
  transition: all 0.2s;
  flex: 1;
  text-align: center;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.panel-btn:hover { background: rgba(127,220,181,0.08); border-color: var(--aurora-1); }
.panel-btn:active { transform: scale(0.97); }
.panel-btn.danger { color: var(--revoked); }
.panel-btn.danger:hover { background: rgba(199,84,84,0.08); border-color: var(--revoked); }
.panel-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.panel-activity {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  max-height: 200px;
  overflow-y: auto;
}

.activity-row {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--fg-dim);
  padding: 0.2rem 0;
  display: flex;
  gap: 0.6rem;
  align-items: center;
  letter-spacing: 0.04em;
}

.activity-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.activity-dot.push            { background: var(--aurora-1); }
.activity-dot.pull            { background: var(--aurora-2); }
.activity-dot.discovery       { background: var(--aurora-3); }
.activity-dot.pull_identity   { background: var(--aurora-1); }
.activity-dot.pull_revocation { background: var(--revoked); }
.activity-dot.pull_empty      { background: var(--fg-dim); }
.activity-dot.push_fail,
.activity-dot.pull_fail       { background: var(--revoked); }

.activity-time {
  color: var(--fg-dim);
  opacity: 0.65;
  font-variant-numeric: tabular-nums;
  min-width: 58px;
}

.panel-events {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  max-height: 170px;
  overflow-y: auto;
}

.panel-event {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--fg);
  padding: 0.4rem 0.55rem;
  background: rgba(6,9,18,0.55);
  border: 1px solid var(--line);
  border-radius: 3px;
  display: flex;
  gap: 0.55rem;
  align-items: center;
  letter-spacing: 0.02em;
}

.panel-event .sev {
  width: 6px; height: 6px;
  border-radius: 2px;
  flex-shrink: 0;
}
.panel-event .sev.critical { background: var(--critical); }
.panel-event .sev.high     { background: var(--high); }
.panel-event .sev.medium   { background: var(--medium); }
.panel-event .sev.low      { background: var(--low); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-hi); border-radius: 999px; }
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora__blob aurora__blob--a"></div>
  <div class="aurora__blob aurora__blob--b"></div>
  <div class="aurora__blob aurora__blob--c"></div>
</div>
<div class="grain"></div>
<div class="vignette"></div>

<div class="hud">
  <div class="hud-eyebrow">Team Nordlys · STK</div>
  <div class="hud-title">Mesh-topologi</div>
  <div class="hud-sub">live · gossip · signerte hendelser</div>
</div>

<div class="stats">
  <div class="stats-line">Peers <span class="stats-val" id="statPeers">—</span></div>
  <div class="stats-line">Hendelser <span class="stats-val" id="statEvents">—</span></div>
  <div class="stats-line">Gossip-linker <span class="stats-val" id="statLinks">—</span></div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot kraftcert"></span> KraftCERT</div>
  <div class="legend-item"><span class="legend-dot online"></span> Online</div>
  <div class="legend-item"><span class="legend-dot offline"></span> Offline</div>
  <div class="legend-item"><span class="legend-dot revoked"></span> Revokert</div>
  <div class="legend-item"><span class="legend-dot varde"></span> Bak Varde</div>
</div>

<div class="zoom-hint">
  <div><span>scroll</span>zoom</div>
  <div><span>drag</span>flytt</div>
  <div><span>klikk</span>node</div>
</div>

<div class="event-log" id="eventLog"></div>

<div class="panel" id="panel">
  <div class="panel-head">
    <span class="panel-company" id="panelCompany">—</span>
    <button class="panel-close" onclick="closePanel()">&times;</button>
  </div>
  <div id="panelBadges"></div>
  <div class="panel-section">Detaljer</div>
  <div class="panel-meta" id="panelMeta"></div>
  <div class="panel-section">Handlinger</div>
  <div class="panel-actions" id="panelActions"></div>
  <div class="panel-section">Gossip-aktivitet</div>
  <div class="panel-activity" id="panelActivity"></div>
  <div class="panel-section">Siste hendelser</div>
  <div class="panel-events" id="panelEvents"></div>
</div>

<canvas id="topo"></canvas>

<script>
// Default: pure animation, no backend. Pass ?live=1 (and optionally ?peers=…)
// to drive the visualization from real STK nodes instead.
const QS = new URLSearchParams(window.location.search);
const SIM_MODE = QS.get('live') !== '1';

const PEER_URLS = (QS.get('peers') || '')
  .split(',').filter(Boolean);
if (!PEER_URLS.length && !SIM_MODE) {
  PEER_URLS.push('http://localhost:8000','http://localhost:8001','http://localhost:8002','http://localhost:8003','http://localhost:8004');
}

// ── Style-kit colors mirrored to JS (kept in sync with :root) ──

const C = {
  bg:        '#060912',
  fg:        '#e8e3d4',
  fgDim:     '#9a9789',
  aurora1:   '#7fdcb5',
  aurora2:   '#8fc3df',
  aurora3:   '#d8c98a',
  offline:   '#475569',
  revoked:   '#c75454',
  high:      '#d99964',
  medium:    '#d8c98a',
  low:       '#7fdcb5',
};

const canvas = document.getElementById('topo');
const ctx = canvas.getContext('2d');

// ── State ──────────────────────────────────────────────────

const nodes = new Map();
const links = [];
let seenEvents = new Set();
let particles = [];
let pulses = [];
let linkActivity = new Map();
let dashOffset = 0;
let activitySince = 0;
let dragNode = null;
let mouse = { x: 0, y: 0 };

// Camera (zoom + pan in screen space)
const camera = { zoom: 1.6, x: 0, y: 0 };
let panning = null;

// ── Canvas sizing ──────────────────────────────────────────

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Coord helpers ──────────────────────────────────────────

function screenToWorld(sx, sy) {
  return { x: (sx - camera.x) / camera.zoom, y: (sy - camera.y) / camera.zoom };
}

// ── Data fetching ──────────────────────────────────────────

async function fetchJSON(url, timeout = 3000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeout);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    return await r.json();
  } catch { clearTimeout(t); return null; }
}

function resolveNodeId(peerUrl) {
  for (const [id] of nodes) {
    const stem = id.replace(/-\d+$/, '');
    if (peerUrl.includes(stem)) return id;
  }
  return null;
}

async function poll() {
  const allRevoked = new Set();
  let totalEvents = 0;

  for (const base of PEER_URLS) {
    const [health, peers, identity, events, activity] = await Promise.all([
      fetchJSON(`${base}/health`),
      fetchJSON(`${base}/peers`),
      fetchJSON(`${base}/identity`),
      fetchJSON(`${base}/events`),
      fetchJSON(`${base}/gossip/activity?since=${activitySince}`),
    ]);

    const online = !!health;
    const nodeId = health?.node_id ?? base;
    const company = health?.company ?? base;
    const role = health?.role ?? 'peer';
    const evCount = events?.length ?? 0;
    totalEvents += evCount;

    const revs = identity?.revocations ?? [];
    for (const r of revs) allRevoked.add(r.node_id);

    if (!nodes.has(nodeId)) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      nodes.set(nodeId, {
        x: cx + (Math.random() - 0.5) * 200,
        y: cy + (Math.random() - 0.5) * 200,
        vx: 0, vy: 0,
        company, role, online, revoked: false,
        eventCount: evCount, url: base, peers: [], varde: '',
      });
    }

    const node = nodes.get(nodeId);
    node.online = online;
    node.company = company;
    node.role = role;
    node.eventCount = evCount;
    node.heartbeat = health?.heartbeat ?? 0;
    node.varde = health?.varde ?? '';

    const peerList = peers?.peers ?? [];
    node.peers = peerList.map(p => p.url);

    if (activity?.activity) {
      for (const act of activity.activity) {
        const targetId = resolveNodeId(act.peer);
        if (!targetId) continue;
        const src = nodes.get(nodeId);
        const tgt = nodes.get(targetId);
        if (!src || !tgt) continue;

        const lk = [nodeId, targetId].sort().join('::');
        linkActivity.set(lk, { lastActive: Date.now(), intensity: 1 });

        if (act.action === 'push' && act.count > 0) {
          particles.push({ srcId: nodeId, tgtId: targetId, progress: 0, speed: 0.025,
            color: C.aurora1, label: `push ${act.count}`, size: 4 + Math.min(act.count, 5) });
        } else if (act.action === 'pull' && act.count > 0) {
          particles.push({ srcId: targetId, tgtId: nodeId, progress: 0, speed: 0.015,
            color: C.aurora2, label: `pull ${act.count}`, size: 3 + Math.min(act.count, 4) });
        } else if (act.action === 'discovery') {
          particles.push({ srcId: targetId, tgtId: nodeId, progress: 0, speed: 0.02,
            color: C.aurora3, label: 'discovery', size: 3 });
        } else if (act.action === 'pull_identity') {
          particles.push({ srcId: targetId, tgtId: nodeId, progress: 0, speed: 0.018,
            color: C.aurora1, label: `identity ×${act.count}`, size: 3 });
        } else if (act.action === 'pull_revocation') {
          particles.push({ srcId: targetId, tgtId: nodeId, progress: 0, speed: 0.02,
            color: C.revoked, label: 'revoke', size: 5 });
        } else if (act.action === 'push_fail' || act.action === 'pull_fail') {
          linkActivity.set(lk, { lastActive: Date.now(), intensity: 1, failed: true });
        }

        if (act.t > activitySince) activitySince = act.t;
      }
    }

    if (events) {
      for (const ev of events) {
        if (!seenEvents.has(ev.id)) {
          seenEvents.add(ev.id);
          const src = nodes.get(ev.node_id);
          if (src) {
            const pColor =
              ev.severity === 'critical' ? C.revoked :
              ev.severity === 'high' ? C.high :
              ev.severity === 'medium' ? C.medium : C.aurora1;
            pulses.push({ x: src.x, y: src.y, radius: 0, opacity: 1, color: pColor });
          }
          addLogEntry(ev);
        }
      }
    }
  }

  for (const [id, n] of nodes) n.revoked = allRevoked.has(id);

  links.length = 0;
  const linkSet = new Set();
  for (const [id, n] of nodes) {
    for (const peerUrl of n.peers) {
      const targetId = resolveNodeId(peerUrl);
      if (targetId && targetId !== id) {
        const key = [id, targetId].sort().join('::');
        if (!linkSet.has(key)) {
          linkSet.add(key);
          links.push({ source: id, target: targetId });
        }
      }
    }
  }

  document.getElementById('statPeers').textContent = nodes.size;
  document.getElementById('statEvents').textContent = totalEvents;
  document.getElementById('statLinks').textContent = links.length;
}

function addLogEntry(ev) {
  const log = document.getElementById('eventLog');
  const el = document.createElement('div');
  el.className = `log-entry ${ev.severity}`;
  const t = new Date(ev.created_at).toLocaleTimeString('nb-NO', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.textContent = `${t}  ${ev.company} — ${ev.title}`;
  log.prepend(el);
  while (log.children.length > 8) log.lastChild.remove();
}

// ── Physics ────────────────────────────────────────────────

function simulate() {
  const nodeArr = [...nodes.values()];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  for (let i = 0; i < nodeArr.length; i++) {
    for (let j = i + 1; j < nodeArr.length; j++) {
      const a = nodeArr[i], b = nodeArr[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = 8000 / (dist * dist);
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }

  for (const link of links) {
    const a = nodes.get(link.source);
    const b = nodes.get(link.target);
    if (!a || !b) continue;
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
    let force = (dist - 180) * 0.005;
    let fx = (dx / dist) * force;
    let fy = (dy / dist) * force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  }

  for (const n of nodeArr) {
    n.vx += (cx - n.x) * 0.0003;
    n.vy += (cy - n.y) * 0.0003;
  }

  for (const n of nodeArr) {
    if (n === dragNode) continue;
    n.vx *= 0.85;
    n.vy *= 0.85;
    n.x += n.vx;
    n.y += n.vy;
  }
}

// ── Helpers ────────────────────────────────────────────────

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b];
}

// ── Rendering ──────────────────────────────────────────────

function draw() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  ctx.clearRect(0, 0, W, H);

  // Apply camera transform
  ctx.save();
  ctx.translate(camera.x, camera.y);
  ctx.scale(camera.zoom, camera.zoom);

  // Background grid (subtle, in world space so it pans/zooms with the mesh)
  const gridSize = 80;
  const left = -camera.x / camera.zoom;
  const top = -camera.y / camera.zoom;
  const right = left + W / camera.zoom;
  const bottom = top + H / camera.zoom;
  ctx.strokeStyle = 'rgba(232,227,212,0.04)';
  ctx.lineWidth = 1 / camera.zoom;
  const x0 = Math.floor(left / gridSize) * gridSize;
  const y0 = Math.floor(top / gridSize) * gridSize;
  for (let x = x0; x < right; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bottom); ctx.stroke();
  }
  for (let y = y0; y < bottom; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
  }

  dashOffset -= 0.15;
  const now = Date.now();

  // ── Links ────────────────────────────────────────────────
  for (const link of links) {
    const a = nodes.get(link.source);
    const b = nodes.get(link.target);
    if (!a || !b) continue;

    const bothOnline = a.online && b.online && !a.revoked && !b.revoked;
    const lk = [link.source, link.target].sort().join('::');
    const act = linkActivity.get(lk);
    const isActive = act && (now - act.lastActive < 5000);
    const isFailed = act?.failed && (now - act.lastActive < 3000);
    if (act) act.intensity = Math.max(0, 1 - (now - act.lastActive) / 5000);

    if (isFailed) {
      ctx.strokeStyle = `rgba(199,84,84,${0.45 * act.intensity})`;
      ctx.lineWidth = 3;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    } else if (isActive && bothOnline) {
      ctx.strokeStyle = `rgba(127,220,181,${0.18 * act.intensity})`;
      ctx.lineWidth = 8;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }

    if (isActive && bothOnline) {
      ctx.strokeStyle = `rgba(127,220,181,${0.25 + 0.35 * act.intensity})`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([]);
    } else {
      ctx.strokeStyle = bothOnline ? 'rgba(127,220,181,0.16)' : 'rgba(232,227,212,0.10)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.lineDashOffset = dashOffset;
    }
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
  }

  // ── Particles ────────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.progress += p.speed;
    if (p.progress >= 1) { particles.splice(i, 1); continue; }
    const src = nodes.get(p.srcId);
    const tgt = nodes.get(p.tgtId);
    if (!src || !tgt) { particles.splice(i, 1); continue; }

    const x = src.x + (tgt.x - src.x) * p.progress;
    const y = src.y + (tgt.y - src.y) * p.progress;
    const [r, g, b] = hexToRgb(p.color);

    const grad = ctx.createRadialGradient(x, y, 0, x, y, p.size * 3);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.35)`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, p.size * 3, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(x, y, p.size, 0, Math.PI * 2); ctx.fill();

    const trailLen = 0.08;
    const tx = src.x + (tgt.x - src.x) * Math.max(0, p.progress - trailLen);
    const ty = src.y + (tgt.y - src.y) * Math.max(0, p.progress - trailLen);
    const trailGrad = ctx.createLinearGradient(tx, ty, x, y);
    trailGrad.addColorStop(0, 'transparent');
    trailGrad.addColorStop(1, `rgba(${r},${g},${b},0.45)`);
    ctx.strokeStyle = trailGrad;
    ctx.lineWidth = p.size * 0.8;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(x, y); ctx.stroke();

    if (p.label && p.progress > 0.15 && p.progress < 0.85) {
      ctx.font = '500 10px "JetBrains Mono", monospace';
      ctx.fillStyle = `rgba(${r},${g},${b},0.85)`;
      ctx.textAlign = 'center';
      ctx.fillText(p.label, x, y - p.size - 6);
    }
  }

  // ── Ripple pulses ────────────────────────────────────────
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.radius += 2;
    p.opacity -= 0.015;
    if (p.opacity <= 0) { pulses.splice(i, 1); continue; }
    const [r, g, b] = hexToRgb(p.color);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${p.opacity})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ── Nodes ────────────────────────────────────────────────
  for (const [id, n] of nodes) {
    const isKC = n.role === 'kraftcert';
    const radius = isKC ? 36 : 28;

    // Outer glow
    if (n.online && !n.revoked) {
      const color = isKC ? 'rgba(143,195,223,0.16)' : 'rgba(127,220,181,0.13)';
      const grad = ctx.createRadialGradient(n.x, n.y, radius, n.x, n.y, radius * 2.6);
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(n.x, n.y, radius * 2.6, 0, Math.PI * 2);
      ctx.fill();
    }

    // Node disc
    ctx.beginPath();
    ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
    if (n.revoked) {
      ctx.fillStyle = 'rgba(199,84,84,0.10)';
      ctx.strokeStyle = 'rgba(199,84,84,0.7)';
    } else if (!n.online) {
      ctx.fillStyle = 'rgba(71,85,105,0.18)';
      ctx.strokeStyle = 'rgba(154,151,137,0.45)';
    } else if (isKC) {
      ctx.fillStyle = 'rgba(143,195,223,0.10)';
      ctx.strokeStyle = 'rgba(143,195,223,0.7)';
    } else {
      ctx.fillStyle = 'rgba(127,220,181,0.08)';
      ctx.strokeStyle = 'rgba(127,220,181,0.6)';
    }
    ctx.lineWidth = isKC ? 2 : 1.6;
    ctx.fill();
    ctx.stroke();

    // KraftCERT inner ring
    if (isKC && n.online) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, radius - 7, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(143,195,223,0.32)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Revoked X
    if (n.revoked) {
      ctx.strokeStyle = 'rgba(199,84,84,0.75)';
      ctx.lineWidth = 2;
      const s = radius * 0.5;
      ctx.beginPath(); ctx.moveTo(n.x - s, n.y - s); ctx.lineTo(n.x + s, n.y + s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(n.x + s, n.y - s); ctx.lineTo(n.x - s, n.y + s); ctx.stroke();
    }

    // Company name
    ctx.font = `${isKC ? 600 : 500} ${isKC ? 14 : 13}px "Bricolage Grotesque", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = n.revoked ? 'rgba(199,84,84,0.85)' : n.online ? C.fg : C.fgDim;
    ctx.fillText(n.company, n.x, n.y + radius + 18);

    // Node ID
    ctx.font = '500 10px "JetBrains Mono", monospace';
    ctx.fillStyle = n.revoked ? 'rgba(199,84,84,0.55)' : 'rgba(154,151,137,0.85)';
    ctx.fillText(id, n.x, n.y + radius + 32);

    // IdP badge for KraftCERT
    if (isKC) {
      ctx.font = '500 9px "JetBrains Mono", monospace';
      const badgeText = 'IdP';
      const tw = ctx.measureText(badgeText).width;
      const bx = n.x - tw / 2 - 5;
      const by = n.y - radius - 16;
      ctx.fillStyle = 'rgba(143,195,223,0.16)';
      ctx.strokeStyle = 'rgba(143,195,223,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(bx, by, tw + 10, 14, 7);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = C.aurora2;
      ctx.textAlign = 'center';
      ctx.fillText(badgeText, n.x, by + 10);
    }

    // Varde dashed ring + badge
    if (n.varde) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, radius + 11, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(216,201,138,0.42)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.lineDashOffset = dashOffset * 2;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;

      ctx.font = '500 8px "JetBrains Mono", monospace';
      const vt = 'VARDE';
      const vtw = ctx.measureText(vt).width;
      const vbx = n.x - vtw / 2 - 5;
      const vby = n.y + radius + 38;
      ctx.fillStyle = 'rgba(216,201,138,0.14)';
      ctx.strokeStyle = 'rgba(216,201,138,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(vbx, vby, vtw + 10, 13, 7);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = C.aurora3;
      ctx.textAlign = 'center';
      ctx.fillText(vt, n.x, vby + 9);
    }

    // Selection ring
    if (id === selectedNode) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, radius + 7, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(232,227,212,0.4)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.lineDashOffset = dashOffset * 3;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;
    }

    // Event count badge
    if (n.eventCount > 0 && !n.revoked) {
      const badge = `${n.eventCount}`;
      ctx.font = '500 10px "JetBrains Mono", monospace';
      const bw = Math.max(ctx.measureText(badge).width + 10, 20);
      const bx = n.x + radius - 4;
      const by = n.y - radius - 2;
      ctx.fillStyle = isKC ? 'rgba(143,195,223,0.92)' : 'rgba(127,220,181,0.92)';
      ctx.beginPath();
      ctx.roundRect(bx - bw/2, by - 8, bw, 16, 8);
      ctx.fill();
      ctx.fillStyle = C.bg;
      ctx.textAlign = 'center';
      ctx.fillText(badge, bx, by + 3);
    }
  }

  ctx.restore();

  simulate();
  requestAnimationFrame(draw);
}

// ── Interaction ────────────────────────────────────────────

let selectedNode = null;
let dragStart = null;

function getNodeAt(sx, sy) {
  const w = screenToWorld(sx, sy);
  for (const [id, n] of nodes) {
    const dx = w.x - n.x, dy = w.y - n.y;
    const r = n.role === 'kraftcert' ? 36 : 28;
    if (dx * dx + dy * dy < (r + 12) * (r + 12)) return { id, node: n };
  }
  return null;
}

canvas.addEventListener('mousedown', (e) => {
  const hit = getNodeAt(e.clientX, e.clientY);
  if (hit) {
    dragNode = hit.node;
    dragStart = { x: e.clientX, y: e.clientY };
    canvas.style.cursor = 'grabbing';
  } else {
    panning = { x: e.clientX, y: e.clientY, camX: camera.x, camY: camera.y };
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  if (dragNode) {
    const w = screenToWorld(e.clientX, e.clientY);
    dragNode.x = w.x;
    dragNode.y = w.y;
    dragNode.vx = 0;
    dragNode.vy = 0;
  } else if (panning) {
    camera.x = panning.camX + (e.clientX - panning.x);
    camera.y = panning.camY + (e.clientY - panning.y);
  } else {
    canvas.style.cursor = getNodeAt(e.clientX, e.clientY) ? 'grab' : 'default';
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (dragNode && dragStart) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
      const hit = getNodeAt(e.clientX, e.clientY);
      if (hit) openPanel(hit.id);
    }
  }
  dragNode = null;
  dragStart = null;
  panning = null;
  canvas.style.cursor = 'default';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * 0.0015);
  const newZoom = Math.max(0.4, Math.min(4, camera.zoom * factor));
  // Zoom toward cursor: keep world point under cursor stable
  const wx = (e.clientX - camera.x) / camera.zoom;
  const wy = (e.clientY - camera.y) / camera.zoom;
  camera.zoom = newZoom;
  camera.x = e.clientX - wx * camera.zoom;
  camera.y = e.clientY - wy * camera.zoom;
}, { passive: false });

canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  const hit = getNodeAt(t.clientX, t.clientY);
  if (hit) { dragNode = hit.node; dragStart = { x: t.clientX, y: t.clientY }; e.preventDefault(); }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (dragNode) {
    const t = e.touches[0];
    const w = screenToWorld(t.clientX, t.clientY);
    dragNode.x = w.x; dragNode.y = w.y;
    dragNode.vx = 0; dragNode.vy = 0;
    e.preventDefault();
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (dragNode && dragStart) {
    const t = e.changedTouches[0];
    const dx = t.clientX - dragStart.x, dy = t.clientY - dragStart.y;
    if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
      const hit = getNodeAt(t.clientX, t.clientY);
      if (hit) openPanel(hit.id);
    }
  }
  dragNode = null; dragStart = null;
});

// Center camera on first poll so the initial 1.6× zoom keeps the mesh in frame
function centerCamera() {
  const W = window.innerWidth, H = window.innerHeight;
  camera.x = W / 2 - (W / 2) * camera.zoom;
  camera.y = H / 2 - (H / 2) * camera.zoom;
}
centerCamera();
window.addEventListener('resize', centerCamera);

async function openPanel(nodeId) {
  selectedNode = nodeId;
  const n = nodes.get(nodeId);
  if (!n) return;

  document.getElementById('panelCompany').textContent = n.company;

  const status = n.revoked ? 'revoked' : n.online ? 'online' : 'offline';

  document.getElementById('panelBadges').innerHTML =
    `<span class="panel-badge ${status}">${statusLabel}</span>` +
    (n.role === 'kraftcert' ? '<span class="panel-badge idp">IdP</span>' : '') +
    (n.varde ? `<span class="panel-badge varde">${esc(n.varde)}</span>` : '');

  document.getElementById('panelMeta').innerHTML = `
    <div class="panel-meta-item"><span class="panel-meta-label">Node ID</span><span class="panel-meta-val">${esc(nodeId)}</span></div>
    <div class="panel-meta-item"><span class="panel-meta-label">Rolle</span><span class="panel-meta-val">${n.role}</span></div>
    <div class="panel-meta-item"><span class="panel-meta-label">Hendelser</span><span class="panel-meta-val">${n.eventCount}</span></div>
    <div class="panel-meta-item"><span class="panel-meta-label">Heartbeat</span><span class="panel-meta-val">${n.heartbeat ?? '—'}</span></div>
    ${n.varde ? `<div class="panel-meta-item"><span class="panel-meta-label">Varde</span><span class="panel-meta-val" style="color:var(--aurora-3)">${esc(n.varde)}</span></div>` : ''}
  `;

  const actions = [];
  if (!n.revoked && n.online) {
    actions.push(`<button class="panel-btn" onclick="sendEvent('${nodeId}')">Send hendelse</button>`);
  }
  if (!n.revoked && n.role !== 'kraftcert') {
    actions.push(`<button class="panel-btn danger" onclick="revokeNode('${nodeId}')">Revoker peer</button>`);
  }
  if (n.revoked) {
    actions.push(`<button class="panel-btn" disabled>Revokert — ingen handlinger</button>`);
  }
  document.getElementById('panelActions').innerHTML = actions.join('');

  let actList = [];
  let evList = [];
  if (SIM_MODE) {
    actList = (n.activityLog ?? []).slice(-15).reverse();
    evList = (n.eventList ?? []).slice(0, 8);
  } else {
    const actData = await fetchJSON(`${n.url}/gossip/activity?since=0`);
    actList = (actData?.activity ?? []).slice(-15).reverse();
    const evData = await fetchJSON(`${n.url}/events`);
    evList = (evData ?? []).slice(0, 8);
  }

  document.getElementById('panelActivity').innerHTML = actList.length === 0
    ? '<div style="font-size:0.7rem;color:var(--fg-dim)">Ingen aktivitet enda</div>'
    : actList.map(a => `
      <div class="activity-row">
        <span class="activity-dot ${a.action}"></span>
        <span class="activity-time">${fmtTime(a.t)}</span>
        <span>${ACTION_LABELS[a.action] ?? a.action}${a.count ? ` (${a.count})` : ''}</span>
      </div>
    `).join('');

  document.getElementById('panelEvents').innerHTML = evList.length === 0
    ? '<div style="font-size:0.7rem;color:var(--fg-dim)">Ingen hendelser</div>'
    : evList.map(e => `
      <div class="panel-event">
        <span class="sev ${e.severity}"></span>
        <span>${esc(e.title)}</span>
      </div>
    `).join('');

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  selectedNode = null;
}

async function sendEvent(nodeId) {
  const n = nodes.get(nodeId);
  if (!n) return;
  const ev = SIM_EVENTS[Math.floor(Math.random() * SIM_EVENTS.length)];
  if (SIM_MODE) {
    simEmitEvent(nodeId, ev);
    // Gossip the event to a random peer for visual flair
    const peers = links.filter(l => l.source === nodeId || l.target === nodeId);
    if (peers.length) {
      const lk = peers[Math.floor(Math.random() * peers.length)];
      const tgt = lk.source === nodeId ? lk.target : lk.source;
      simEmitActivity(nodeId, tgt, 'push', 1);
    }
    setTimeout(() => openPanel(nodeId), 200);
    return;
  }
  try {
    await fetch(`${n.url}/events`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(ev),
    });
    setTimeout(() => openPanel(nodeId), 500);
  } catch {}
}

async function revokeNode(nodeId) {
  if (SIM_MODE) {
    const n = nodes.get(nodeId);
    if (!n) return;
    n.revoked = true;
    // Animate the revocation gossiping out from KraftCERT
    let kcId = null;
    for (const [id, nn] of nodes) if (nn.role === 'kraftcert') { kcId = id; break; }
    if (kcId) {
      for (const [id] of nodes) {
        if (id === kcId) continue;
        simEmitActivity(kcId, id, 'pull_revocation', 1);
      }
    }
    setTimeout(() => openPanel(nodeId), 400);
    return;
  }
  let kcUrl = null;
  for (const [, n] of nodes) {
    if (n.role === 'kraftcert') { kcUrl = n.url; break; }
  }
  if (!kcUrl) return;
  try {
    await fetch(`${kcUrl}/revoke`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ node_id: nodeId, reason: `Manuell revokering fra topologivisualisering` }),
    });
    setTimeout(() => openPanel(nodeId), 1000);
  } catch {}
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

// ── Simulation (no backend required) ──────────────────────

const SIM_TOPOLOGY = [
  { id: 'kraftcert-01', company: 'KraftCERT',     role: 'kraftcert', varde: '' },
  { id: 'hafslund-01',  company: 'Hafslund Kraft', role: 'peer',      varde: '' },
  { id: 'glitre-01',    company: 'Glitrenett',     role: 'peer',      varde: '' },
  { id: 'elvia-01',     company: 'Elvia',          role: 'peer',      varde: '' },
  { id: 'statkraft-01', company: 'Statkraft',      role: 'peer',      varde: 'varde-oslo' },
  { id: 'agder-01',     company: 'Agder Energi',   role: 'peer',      varde: 'varde-kristiansand' },
];

// Mesh: KraftCERT to all + a few peer-to-peer links for redundancy
const SIM_LINKS = [
  ['kraftcert-01', 'hafslund-01'],
  ['kraftcert-01', 'glitre-01'],
  ['kraftcert-01', 'elvia-01'],
  ['kraftcert-01', 'statkraft-01'],
  ['kraftcert-01', 'agder-01'],
  ['hafslund-01',  'glitre-01'],
  ['glitre-01',    'elvia-01'],
  ['elvia-01',     'statkraft-01'],
  ['statkraft-01', 'agder-01'],
  ['agder-01',     'hafslund-01'],
];

function simInit() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const R = 220;
  const peers = SIM_TOPOLOGY.filter(t => t.role !== 'kraftcert');

  for (const t of SIM_TOPOLOGY) {
    let x, y;
    if (t.role === 'kraftcert') {
      x = cx; y = cy;
    } else {
      const i = peers.indexOf(t);
      const ang = (i / peers.length) * Math.PI * 2 - Math.PI / 2;
      x = cx + Math.cos(ang) * R;
      y = cy + Math.sin(ang) * R;
    }
    nodes.set(t.id, {
      x, y, vx: 0, vy: 0,
      company: t.company, role: t.role, online: true, revoked: false,
      eventCount: 0, url: '', peers: [], varde: t.varde,
      heartbeat: 0,
      activityLog: [],
      eventList: [],
    });
  }

  for (const [a, b] of SIM_LINKS) {
    links.push({ source: a, target: b });
    // Mirror into node.peers so live-mode link rebuilding stays a no-op
    nodes.get(a).peers.push(b);
    nodes.get(b).peers.push(a);
  }
}

function simEmitActivity(srcId, tgtId, action, count) {
  const src = nodes.get(srcId);
  const tgt = nodes.get(tgtId);
  if (!src || !tgt || src.revoked || tgt.revoked) return;

  const lk = [srcId, tgtId].sort().join('::');
  linkActivity.set(lk, { lastActive: Date.now(), intensity: 1 });

  const t = Math.floor(Date.now() / 1000);

  if (action === 'push' && count > 0) {
    particles.push({ srcId, tgtId, progress: 0, speed: 0.025,
      color: C.aurora1, label: `push ${count}`, size: 4 + Math.min(count, 5) });
  } else if (action === 'pull' && count > 0) {
    particles.push({ srcId: tgtId, tgtId: srcId, progress: 0, speed: 0.015,
      color: C.aurora2, label: `pull ${count}`, size: 3 + Math.min(count, 4) });
  } else if (action === 'discovery') {
    particles.push({ srcId: tgtId, tgtId: srcId, progress: 0, speed: 0.02,
      color: C.aurora3, label: 'discovery', size: 3 });
  } else if (action === 'pull_identity') {
    particles.push({ srcId: tgtId, tgtId: srcId, progress: 0, speed: 0.018,
      color: C.aurora1, label: `identity ×${count}`, size: 3 });
  } else if (action === 'pull_revocation') {
    particles.push({ srcId, tgtId, progress: 0, speed: 0.02,
      color: C.revoked, label: 'revoke', size: 5 });
  }

  src.activityLog.push({ t, action, peer: tgtId, count: count ?? 0 });
  if (src.activityLog.length > 60) src.activityLog.shift();
  src.heartbeat = (src.heartbeat ?? 0) + 1;
}

function simEmitEvent(nodeId, ev) {
  const n = nodes.get(nodeId);
  if (!n || n.revoked) return;
  const id = `sim-${nodeId}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
  const created_at = new Date().toISOString();
  const full = { id, node_id: nodeId, company: n.company,
    title: ev.title, severity: ev.severity, created_at };

  n.eventList.unshift(full);
  if (n.eventList.length > 30) n.eventList.pop();
  n.eventCount += 1;

  const pColor =
    ev.severity === 'critical' ? C.revoked :
    ev.severity === 'high' ? C.high :
    ev.severity === 'medium' ? C.medium : C.aurora1;
  pulses.push({ x: n.x, y: n.y, radius: 0, opacity: 1, color: pColor });
  addLogEntry(full);

  document.getElementById('statEvents').textContent =
    [...nodes.values()].reduce((s, nn) => s + nn.eventCount, 0);
}

function simRefreshStats() {
  document.getElementById('statPeers').textContent = nodes.size;
  document.getElementById('statEvents').textContent =
    [...nodes.values()].reduce((s, n) => s + n.eventCount, 0);
  document.getElementById('statLinks').textContent = links.length;
}

function pickWeighted(weights) {
  const sum = weights.reduce((s, w) => s + w[1], 0);
  let r = Math.random() * sum;
  for (const [v, w] of weights) { r -= w; if (r <= 0) return v; }
  return weights[weights.length - 1][0];
}

function simTick() {
  // One gossip exchange per tick — paced so 5–6 nodes don't feel busy
  const bursts = 1;
  for (let i = 0; i < bursts; i++) {
    const live = links.filter(l => {
      const a = nodes.get(l.source), b = nodes.get(l.target);
      return a && b && !a.revoked && !b.revoked;
    });
    if (!live.length) break;
    const link = live[Math.floor(Math.random() * live.length)];

    const action = pickWeighted([
      ['push', 38], ['pull', 30], ['pull_identity', 12],
      ['discovery', 8], ['pull_empty', 12],
    ]);

    // Direction: KraftCERT identity flows outward; otherwise random
    let srcId = link.source, tgtId = link.target;
    if (Math.random() < 0.5) [srcId, tgtId] = [tgtId, srcId];
    if (action === 'pull_identity') {
      const kcEnd = [link.source, link.target].find(id => nodes.get(id)?.role === 'kraftcert');
      if (kcEnd) { srcId = kcEnd; tgtId = (link.source === kcEnd ? link.target : link.source); }
    }

    if (action === 'pull_empty') {
      // Just record the heartbeat, no particle
      const t = Math.floor(Date.now() / 1000);
      const src = nodes.get(srcId);
      if (src) {
        src.activityLog.push({ t, action, peer: tgtId, count: 0 });
        if (src.activityLog.length > 60) src.activityLog.shift();
      }
      continue;
    }

    const count = action === 'push' || action === 'pull'
      ? 1 + Math.floor(Math.random() * 4)
      : 1;
    simEmitActivity(srcId, tgtId, action, count);
  }
}

function simEventTick() {
  const candidates = [...nodes.values()].filter(n => !n.revoked && n.role !== 'kraftcert');
  if (!candidates.length) return;
  const n = candidates[Math.floor(Math.random() * candidates.length)];
  const ev = SIM_EVENTS[Math.floor(Math.random() * SIM_EVENTS.length)];
  // Find the node id for this node
  let nodeId = null;
  for (const [id, nn] of nodes) if (nn === n) { nodeId = id; break; }
  if (!nodeId) return;
  simEmitEvent(nodeId, ev);
  // Gossip the event to one or two neighbors, staggered so it reads as a wave
  const myLinks = links.filter(l => l.source === nodeId || l.target === nodeId);
  const fanout = Math.min(myLinks.length, 1 + Math.floor(Math.random() * 2));
  const shuffled = myLinks.slice().sort(() => Math.random() - 0.5).slice(0, fanout);
  shuffled.forEach((lk, i) => {
    const tgt = lk.source === nodeId ? lk.target : lk.source;
    setTimeout(() => simEmitActivity(nodeId, tgt, 'push', 1), 400 + i * 600);
  });
}

// ── Init ───────────────────────────────────────────────────

if (SIM_MODE) {
  simInit();
  simRefreshStats();
  setInterval(simTick, 1600);
  setInterval(simEventTick, 12000);
  // Kick off an initial event so the log isn't empty on load
  setTimeout(simEventTick, 2500);
} else {
  poll();
  setInterval(poll, 3000);
}
draw();
</script>
