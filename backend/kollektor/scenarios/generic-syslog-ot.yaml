pack: generic-syslog-ot
vendor: any
equipment_type: any
maintainer: kraftcert
version: "2026.04.1"
description: |
  Utstyrs-uavhengige deteksjonsregler som matcher mønstre i RFC 5424/3164 syslog
  fra de fleste OT-produkter (RTU-er, vernrelé, switcher, gatewayer). Tjener som
  default-pakke for peers som ikke har lastet inn produsent-spesifikke pakker enda.

scenarios:
  - id: ot-bruteforce-burst
    title: "Brute-force mot OT-utstyr"
    description: "5+ mislykkede innloggingsforsøk fra samme kilde innen 60 sekunder"
    maturity: stable
    fp_likelihood: low
    mitre: [T1110.001]
    match:
      regex: 'authentication failure.*(?:user|login)=(?P<user>\S+).*(?:source|from)=(?P<src>\S+)'
    aggregate:
      window_seconds: 60
      threshold: 5
      key: [src]
    severity: high
    external_ref_template: "ot-bruteforce-{src}-{window_start}"

  - id: ot-firmware-load
    title: "Firmware-endring på OT-utstyr"
    description: "Firmware-opplasting, -aktivering eller -endring detektert i syslog"
    maturity: stable
    fp_likelihood: low
    mitre: [T0857]
    match:
      regex: 'firmware.*(?:upload|loaded|changed|updated|installed|activated)'
    severity: critical

  - id: ot-config-change
    title: "Konfigurasjonsendring på OT-utstyr"
    description: "Konfigurasjonsendring utført av bruker — verifiser at det er autorisert vedlikehold"
    maturity: beta
    fp_likelihood: medium
    mitre: [T0836]
    match:
      regex: 'config.*(?:change|updated|modified)\s+by\s+(?:user=)?(?P<user>\S+)'
    severity: medium

  - id: ot-comm-loss
    title: "Kommunikasjonstap på OT-utstyr"
    description: "Link down eller connection lost-melding — ofte planlagt vedlikehold, kjører i shadow"
    maturity: experimental
    fp_likelihood: high
    default_mode: shadow
    match:
      regex: '(?:link down|connection lost|comm(?:unication)?\s+(?:lost|failed))'
    severity: medium
