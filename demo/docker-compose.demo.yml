# STK-demo: tre noder + kollektor-sidecar + RTU-simulator.
#
# Bruk:
#   cd demo
#   ./run-demo.sh         # bootstrapper invite-tokens og starter alt
#   ./attacker/exploit.sh # kjør angrepet (i en annen terminal)
#
# Webgrensesnitt:
#   http://localhost:8800  KraftCERT
#   http://localhost:8801  Hafslund Kraft (peer A — under angrep)
#   http://localhost:8802  Statkraft       (peer B — observerer via gossip)
#   http://localhost:8888  ABB Relion 615  (RTU-simulator)

services:
  # ── STK-noder ──────────────────────────────────────────────
  kraftcert:
    build: ../backend
    ports:
      - "8800:8000"
    environment:
      NODE_ID: kraftcert-01
      COMPANY: KraftCERT
      ROLE: kraftcert
      PEERS: ""
      PUBLIC_URL: http://localhost:8800
    volumes:
      - kraftcert-data:/data

  hafslund:
    build: ../backend
    ports:
      - "8801:8000"
    environment:
      NODE_ID: hafslund-01
      COMPANY: Hafslund Kraft
      ROLE: peer
      PEERS: http://kraftcert:8000
      KRAFTCERT_URL: http://kraftcert:8000
      INVITE_TOKEN: ${INVITE_HAFSLUND:-}
      PUBLIC_URL: http://localhost:8801
      # Shared secret med hafslund-kollektor sidecaren.
      INGEST_KEYS: "kollektor-syslog:demo-secret-hafslund"
    volumes:
      - hafslund-data:/data
    depends_on:
      - kraftcert

  statkraft:
    build: ../backend
    ports:
      - "8802:8000"
    environment:
      NODE_ID: statkraft-01
      COMPANY: Statkraft
      ROLE: peer
      PEERS: http://kraftcert:8000
      KRAFTCERT_URL: http://kraftcert:8000
      INVITE_TOKEN: ${INVITE_STATKRAFT:-}
      PUBLIC_URL: http://localhost:8802
      INGEST_KEYS: "kollektor-syslog:demo-secret-statkraft"
    volumes:
      - statkraft-data:/data
    depends_on:
      - kraftcert

  # ── Kollektor-sidecar (kun for Hafslund i denne demoen) ──────
  # Statkraft har samme infrastruktur tilgjengelig, men mottar
  # ingen syslog i dette scenariet — de observerer angrepet via
  # gossip-meshen istedenfor.
  hafslund-kollektor:
    build: ../backend
    command: >
      python -m kollektor.syslog_adapter
      --node http://hafslund:8000
      --key demo-secret-hafslund
      --config /app/kollektor/peer-config.yaml
      --listen 0.0.0.0:5514
    ports:
      - "5514:5514/udp"
    volumes:
      - ./kollektor-config/hafslund.yaml:/app/kollektor/peer-config.yaml:ro
    depends_on:
      - hafslund

  # ── RTU-simulator (ABB Relion 615) ───────────────────────────
  # Sender RFC 3164 syslog mot Hafslunds kollektor for hver
  # autentiserings-handling, setpunkt-endring og firmware-operasjon.
  rtu-sim:
    build: ./rtu-sim
    ports:
      - "8888:8080"
    environment:
      RTU_DEVICE_ID: RELION615
      SYSLOG_HOST: hafslund-kollektor
      SYSLOG_PORT: "5514"
      RTU_USER: admin
      RTU_PASS: admin   # innebygd default for demo — dokumentert i README
    depends_on:
      - hafslund-kollektor

volumes:
  kraftcert-data:
  hafslund-data:
  statkraft-data:
